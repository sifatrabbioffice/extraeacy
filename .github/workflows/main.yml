name: RE4 Pak Auto Extractor

on:
  # Triggers immediately whenever you upload or change ANY file in the repository
  push:
    branches:
      - main
  # Keeps the manual run button active just in case
  workflow_dispatch:

jobs:
  unpack_process:
    runs-on: windows-latest

    steps:
    - name: 1. Pull Code From Repository
      uses: actions/checkout@v4

    - name: 2. Download and Setup REE Unpacker Tool
      shell: powershell
      run: |
        Write-Host "Fetching Ekey's REE.PAK.Tool..."
        Invoke-WebRequest -Uri "https://github.com/Ekey/REE.PAK.Tool/releases/latest/download/REE.PAK.Tool.zip" -OutFile "tool.zip"
        
        Write-Host "Extracting tool..."
        Expand-Archive -Path "tool.zip" -DestinationPath ".\UnpackerTool"
        
        if (Test-Path ".\UnpackerTool\REE.Unpacker.exe") {
            Write-Host "Success: Unpacker executable is ready."
        } else {
            Write-Error "Failed to ready the extraction tool."
            exit 1
        }

    - name: 3. Verify Pak File and Run Extraction
      shell: powershell
      run: |
        # Search the entire repository for the .pak file automatically
        $PakFile = Get-ChildItem -Recurse -Filter "re_chunk_000.pak" | Select-Object -First 1
        
        if ($PakFile) {
            Write-Host "Found target file at: $($PakFile.FullName)"
            New-Item -ItemType Directory -Force -Path ".\Extracted_Output"
            
            Write-Host "Launching extraction... Please wait."
            & ".\UnpackerTool\REE.Unpacker.exe" "RE4_STM_Release" "$($PakFile.FullName)" ".\Extracted_Output"
        } else {
            Write-Error "CRITICAL ERROR: re_chunk_000.pak was not found anywhere in your GitHub repository! Please upload it."
            exit 1
        }

    - name: 4. Package and Save Extracted Assets
      uses: actions/upload-artifact@v4
      with:
        name: Extracted-RE4-Assets
        path: .\Extracted_Output\
        retention-days: 3
