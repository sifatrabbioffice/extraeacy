name: Upload and Extract RE4 Pak

on:
  # Triggers the workflow manually via the GitHub UI
  workflow_dispatch:
  # Or triggers automatically when a new release/artifact is uploaded
  push:
    branches:
      - main
    paths:
      - '**.pak' # Runs if a .pak file is pushed directly to the repo

jobs:
  extract_pak_job:
    runs-on: windows-latest # REE.PAK.Tool runs natively on Windows

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Download REE.PAK.Tool
      shell: powershell
      run: |
        # Downloads Ekey's REE.PAK.Tool from GitHub releases
        Invoke-WebRequest -Uri "https://github.com/Ekey/REE.PAK.Tool/releases/latest/download/REE.PAK.Tool.zip" -OutFile "REE.PAK.Tool.zip"
        Expand-Archive -Path "REE.PAK.Tool.zip" -DestinationPath ".\PakTool"
        echo "Tool downloaded and extracted successfully."

    - name: Create Extraction Destination Directory
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path ".\Extracted_Files"

    - name: Execute Extraction Command
      shell: powershell
      run: |
        # Define paths (Adjust 're_chunk_000.pak' if it's inside a subfolder)
        $ToolPath = ".\PakTool\REE.Unpacker.exe"
        $PakFile = ".\re_chunk_000.pak"
        $OutputDir = ".\Extracted_Files"
        
        # Verify the file exists before running
        if (Test-Path $PakFile) {
            Write-Host "Found PAK file. Starting extraction..."
            # Runs the tool using the RE4 Steam Release configuration list
            Start-Process -FilePath $ToolPath -ArgumentList '"RE4_STM_Release"', "`"$PakFile`"", "`"$OutputDir`"" -Wait -NoNewWindow
        } else {
            Write-Error "Error: re_chunk_000.pak not found in the root repository folder!"
            exit 1
        }

    - name: Upload Extracted Files as GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RE4-Extracted-Assets
        path: .\Extracted_Files/
        retention-days: 5 # Deletes automatically after 5 days to save space
