name: RE4 Pak Auto Extractor

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unpack_process:
    runs-on: windows-latest

    steps:
    - name: 1. Pull Code From Repository
      uses: actions/checkout@v4

    - name: 2. Download FluffyQuack REtool
      shell: powershell
      run: |
        Write-Host "Downloading compiled REtool..."
        # Pulls the stable compiled executable directly from FluffyQuack's server
        Invoke-WebRequest -Uri "http://www.fluffyquack.com/tools/REtool.rar" -OutFile "REtool.rar"
        
        Write-Host "Extracting RAR package..."
        # Windows-latest runner has 7z built-in to handle .rar files easily
        7z x REtool.rar -o"Utils"
        
        if (Test-Path ".\Utils\retool.exe") {
            Write-Host "Success: retool.exe is compiled and ready."
        } else {
            Write-Error "Failed to locate retool.exe after extraction."
            exit 1
        }

    - name: 3. Verify Pak File and Run Extraction
      shell: powershell
      run: |
        # Locate the uploaded game archive in your repo
        $PakFile = Get-ChildItem -Recurse -Filter "re_chunk_000.pak" | Select-Object -First 1
        
        if ($PakFile) {
            Write-Host "Found target file at: $($PakFile.FullName)"
            New-Item -ItemType Directory -Force -Path ".\Extracted_Output"
            
            Write-Host "Launching extraction via FluffyQuack REtool... This will take some time."
            # Fluffy's syntax: retool.exe -re4 -extract [pak_file_path] [out_dir_path]
            & ".\Utils\retool.exe" -re4 -extract "$($PakFile.FullName)" ".\Extracted_Output"
        } else {
            Write-Error "CRITICAL ERROR: re_chunk_000.pak was not found anywhere in your GitHub repository! Please upload it."
            exit 1
        }

    - name: 4. Package and Save Extracted Assets
      uses: actions/upload-artifact@v4
      with:
        name: Extracted-RE4-Assets
        path: .\Extracted_Output\
        retention-days: 3
